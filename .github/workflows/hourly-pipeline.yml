name: Hourly job search run

on:
  schedule:
    # Twice an hour at off-peak minutes: GitHub cron regularly skips or delays
    # top-of-hour slots (:00 is heavily contended). isDueNow's catch-up window
    # tolerates late triggers, and its slot cooldown makes extra fires no-ops.
    - cron: "13,43 * * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase edge function
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
            -H "Authorization: Bearer ${{ secrets.EDGE_FUNCTION_SECRET }}"
