name: Hourly job search run

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase edge function
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
            -H "Authorization: Bearer ${{ secrets.EDGE_FUNCTION_SECRET }}"
